  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    body { font-family: 'Inter', sans-serif; }

<body class="bg-gray-100 min-h-screen text-gray-900">

<div id="app"></div>
<div id="toasts" class="fixed bottom-4 right-4 space-y-2 z-50"></div>

<script>
// =====================================================================
// === BOOT NOTES ======================================================
// CURRENT_USER, login, logout e loadCurrentUser vêm de js/auth.js
// (carregado no <head> antes deste <script> inline). Não redeclará-los
// aqui — o getter/setter em js/auth.js preserva a semântica de "let"
// global e os call-sites do inline continuam funcionando.
//
// O roteamento (routes, navigate, matchRoute, handleRoute,
// routeAfterLogin) foi extraído para js/router.js, carregado no <head>
// antes deste inline. As rotas são registradas mais abaixo, após as
// telas e antes de main(), via window.RAVATEX_ROUTER.setRoutes(...).
// Os globais legados window.navigate, window.matchRoute,
// window.handleRoute, window.routeAfterLogin e window.routes seguem
// disponíveis (definidos por js/router.js).
//
// As telas sistêmicas screenLogin, screenNotFound e screenForbidden
// foram extraídas para js/screens/system-screens.js, carregado no
// <head> depois de js/router.js e antes deste inline. Os globais
// legados window.screenLogin, window.screenNotFound e
// window.screenForbidden seguem disponíveis.
//
// shellLayout e ADMIN_MENU foram extraídos para js/screens/common.js,
// carregado no <head> depois de js/screens/system-screens.js e antes
// deste inline. Os globais legados window.shellLayout e
// window.ADMIN_MENU seguem disponíveis para as telas abaixo.
//
// As telas de cadastros (screenCadastros{Cores,Clientes,Modelos,
// Parametros,Fornecedores,Precos,Usuarios}) e as constantes
// relacionadas (FORNECEDOR_TIPOS, labelFornecedorTipo) foram
// extraídas para js/screens/cadastros.js, carregado no <head> depois
// de js/screens/common.js e antes deste inline. As globais legadas
// seguem disponíveis para o setRoutes abaixo.
//
// A tela de listagem de OPs (screenListaOPs) foi extraída para
// js/screens/ops-list.js, carregada no <head> depois de
// js/screens/cadastros.js e antes deste inline. A global legada
// window.screenListaOPs segue disponível para o setRoutes abaixo.
//
// Os helpers de UI/read do formulário de entrega (rotuloFio,
// OCF_STATUS_LABEL, buildEntregaInlineForm) foram extraídos para
// js/screens/entrega-form.js, carregado no <head> depois de
// js/screens/ops-list.js e antes deste inline. As globais legadas
// seguem disponíveis para as telas abaixo.
//
// O helper de write `excluirEntrega` foi extraído para
// js/screens/entrega-writes.js (Fase 2.1 do DIAG), carregado
// no <head> depois de js/screens/entrega-form.js e antes deste
// inline. A global legada window.excluirEntrega segue disponível
// para as 4 telas abaixo. Os demais writes (salvar*/atualizar*
// Cima e Latex) permanecem inline por decisão arquitetural.
// =====================================================================

// =====================================================================
// === SCREENS =========================================================
// =====================================================================

function screenPainel() {
  const content = el('div', {},
    el('h1', { class: 'text-2xl font-bold mb-4' }, 'Painel'),
    el('div', { class: 'bg-white rounded-xl p-6 shadow' },
      el('p', { class: 'text-gray-700' }, 'Bem-vindo, ' + CURRENT_USER.nome + '. (Fase 1 — placeholder; as próximas fases vão preencher essa tela.)')
    )
  );
  return shellLayout(ADMIN_MENU, content);
}

function screenFornecedorHome() {
  const content = el('div', {},
    el('h1', { class: 'text-2xl font-bold mb-4' }, 'Área do Fornecedor'),
    el('div', { class: 'bg-white rounded-xl p-6 shadow' },
      el('p', { class: 'text-gray-700' }, 'Olá, ' + CURRENT_USER.nome + '. (Fase 1 — placeholder; suas entregas aparecem aqui a partir da Fase 4/5.)')
    )
  );
  return shellLayout([
    { href: '#/fornecedor/home', label: 'Minhas OPs' },
  ], content);
}

// Persistência das entregas de tecelagem (Fase 5a).
async function salvarEntregaCima({ fornecedorId, opId, payload }) {
  if (payload.linhas.length === 0) { toast('Adicione ao menos 1 item com metros entregues', 'error'); return false; }
  if (!payload.destino_fornecedor_id) { toast('Escolha a empresa de látex de destino', 'error'); return false; }
  const ins = await supa.from('entregas').insert({
    fornecedor_id: fornecedorId, etapa: 'cima', data: payload.data, observacao: payload.observacao,
    destino_fornecedor_id: payload.destino_fornecedor_id,
  }).select().single();
  if (ins.error) { toast('Erro ao gravar entrega', 'error'); console.error(ins.error); return false; }
  const entregaId = ins.data.id;
  const itens = payload.linhas.map(l => ({ entrega_id: entregaId, op_id: opId, ...l }));
  const insItens = await supa.from('entrega_itens').insert(itens);
  if (insItens.error) {
    await supa.from('entregas').delete().eq('id', entregaId);
    toast('Erro ao gravar itens da entrega', 'error'); console.error(insItens.error); return false;
  }
  // Fase 5b: a entrega de tecelagem gera automaticamente a OP de látex.
  const rpc = await supa.rpc('gerar_op_latex', { p_entrega_id: entregaId });
  if (rpc.error) {
    toast('Entrega salva, mas falhou ao gerar a OP de látex. Gere manualmente.', 'error');
    console.error(rpc.error);
    return true;
  }
  toast('Entrega registrada' + (rpc.data ? ' · OP de látex gerada' : ''), 'success');
  return true;
}

async function atualizarEntregaCima({ entregaId, opId, payload }) {
  if (payload.linhas.length === 0) { toast('Adicione ao menos 1 item com metros entregues', 'error'); return false; }
  if (!payload.destino_fornecedor_id) { toast('Escolha a empresa de látex de destino', 'error'); return false; }
  const upd = await supa.from('entregas').update({
    data: payload.data, observacao: payload.observacao,
    destino_fornecedor_id: payload.destino_fornecedor_id,
  }).eq('id', entregaId);
  if (upd.error) { toast('Erro ao atualizar entrega', 'error'); console.error(upd.error); return false; }
  await supa.from('entrega_itens').delete().eq('entrega_id', entregaId);
  const itens = payload.linhas.map(l => ({ entrega_id: entregaId, op_id: opId, ...l }));
  const insItens = await supa.from('entrega_itens').insert(itens);
  // MVP: se a reinsercao falhar aqui, a entrega fica sem itens. Como o app eh
  // single-admin e baixo volume, aceitamos o risco e a correcao manual via Supabase.
  if (insItens.error) { toast('Erro ao regravar itens da entrega', 'error'); console.error(insItens.error); return false; }
  toast('Entrega atualizada', 'success');
  return true;
}

// Persistência dos recebimentos de látex (Fase 5b) e `excluirEntrega`
// foram extraídos para js/screens/entrega-writes.js (Fases 2.1
// e 2.2 do DIAG). As globais legadas window.salvarEntregaLatex,
// window.atualizarEntregaLatex e window.excluirEntrega seguem
// disponíveis para as 4 telas abaixo. Os helpers de Cima
// (salvarEntregaCima, atualizarEntregaCima) permanecem inline
// por decisão arquitetural (Fase 2.3 do DIAG, risco alto por
// causa do rpc gerar_op_latex).

async function screenFornecedorEntregas() {
  const container = el('div', {});
  let latexOptions = [];

  async function reload() {
    if (!CURRENT_USER.fornecedor_id) {
      container.replaceChildren(
        pageHeader('Minhas entregas'),
        el('div', { class: 'bg-white rounded-xl shadow p-8 text-center text-gray-500' },
          'Seu usuário não está vinculado a um fornecedor. Fale com o administrador.')
      );
      return;
    }

    const opfRes = await supa.from('op_fornecedores')
      .select('op_id, ops!inner(id, numero, ano, status, op_itens(id, modelo_id, metros_pedidos, metros_ajustados))')
      .eq('fornecedor_id', CURRENT_USER.fornecedor_id)
      .eq('etapa', 'cima');
    if (opfRes.error) { toast('Erro ao carregar OPs', 'error'); console.error(opfRes.error); return; }
    const ops = (opfRes.data || [])
      .map(r => r.ops)
      .filter(o => o && o.status === 'em_producao');

    const entRes = await supa.from('entregas')
      .select('id, data, observacao, criado_em, destino_fornecedor_id, destino:destino_fornecedor_id(nome), entrega_itens(id, op_id, op_item_id, metros_entregues, defeito, observacao)')
      .eq('fornecedor_id', CURRENT_USER.fornecedor_id)
      .eq('etapa', 'cima')
      .order('data', { ascending: false })
      .order('id', { ascending: false });
    if (entRes.error) { toast('Erro ao carregar entregas', 'error'); console.error(entRes.error); return; }
    const entregas = entRes.data || [];

    const modeloIds = [...new Set(ops.flatMap(o => (o.op_itens || []).map(i => i.modelo_id)))];
    const modelosRes = modeloIds.length
      ? await supa.from('modelos').select('id, nome, largura, cor_1:cor_1_id(id,nome), cor_2:cor_2_id(id,nome)').in('id', modeloIds)
      : { data: [] };
    const modelosById = {};
    for (const m of (modelosRes.data || [])) modelosById[m.id] = m;

    const latexRes = await supa.from('fornecedores').select('id, nome').eq('tipo', 'latex').order('nome');
    if (latexRes.error) { toast('Erro ao carregar empresas de látex', 'error'); console.error(latexRes.error); return; }
    latexOptions = (latexRes.data || []).map(f => ({ value: f.id, label: f.nome }));

    render(ops, entregas, modelosById);
  }

  function render(ops, entregas, modelosById) {
    const fmtMetros = (n) => Number(n).toFixed(2).replace('.', ',') + ' m';
    const blocos = [pageHeader('Minhas entregas')];

    if (ops.length === 0) {
      blocos.push(el('div', { class: 'bg-white rounded-xl shadow p-8 text-center text-gray-500 mb-6' },
        'Nenhuma OP em produção atribuída a você no momento.'));
    } else {
      for (const op of ops) {
        const itensEntreguesNaOP = entregas
          .flatMap(e => e.entrega_itens || [])
          .filter(ei => ei.op_id === op.id);
        const totalPorItem = totalEntregueCimaPorItem(itensEntreguesNaOP);

        const card = el('div', { class: 'bg-white rounded-xl shadow p-5 mb-6' });
        card.appendChild(el('div', { class: 'flex items-center justify-between mb-3' },
          el('div', { class: 'font-semibold text-gray-800' }, `Lote Nº ${op.numero}/${op.ano}`),
          badgeStatus(op.status),
        ));

        card.appendChild(dataTable({
          columns: [
            { key: 'modelo', label: 'Modelo', render: (i) => {
                const m = modelosById[i.modelo_id];
                return m ? `${m.nome} ${larguraKey(m.largura)}m · ${m.cor_1?.nome || '?'}/${m.cor_2?.nome || '?'}` : ('#' + i.modelo_id);
              } },
            { key: 'metros_pedidos', label: 'Pedido', render: (i) => fmtMetros(i.metros_pedidos) },
            { key: 'metros_ajustados', label: 'Ajustado', render: (i) => i.metros_ajustados == null ? fmtMetros(i.metros_pedidos) : fmtMetros(i.metros_ajustados) },
            { key: 'entregue', label: 'Entregue', render: (i) => fmtMetros(totalPorItem[i.id] || 0) },
            { key: 'falta', label: 'Falta', render: (i) => {
                const ajustado = i.metros_ajustados == null ? Number(i.metros_pedidos) : Number(i.metros_ajustados);
                const falta = Math.round((ajustado - (totalPorItem[i.id] || 0)) * 100) / 100;
                const cor = falta <= 0 ? 'text-green-700' : 'text-gray-800';
                const texto = falta <= 0 ? '✅ completo' : fmtMetros(falta);
                return el('span', { class: cor }, texto);
              } },
          ],
          rows: op.op_itens || [],
        }));

        const formHolder = el('div', {});
        const btnNova = el('button', {
          class: 'mt-3 text-sm text-blue-700 hover:underline',
          onclick: () => {
            const form = buildEntregaInlineForm({ opItens: op.op_itens || [], modelosById, latexOptions });
            const btnSalvar = el('button', {
              class: 'bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-lg px-3 py-2 mr-2',
              onclick: async () => {
                btnSalvar.disabled = true;
                const ok = await salvarEntregaCima({ fornecedorId: CURRENT_USER.fornecedor_id, opId: op.id, payload: form.getPayload() });
                btnSalvar.disabled = false;
                if (ok) reload();
              },
            }, 'Salvar entrega');
            const btnCancelar = el('button', {
              class: 'bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm font-semibold rounded-lg px-3 py-2',
              onclick: () => { formHolder.replaceChildren(); btnNova.style.display = ''; },
            }, 'Cancelar');
            const wrap = el('div', {}, form.node, el('div', { class: 'mt-2' }, btnSalvar, btnCancelar));
            formHolder.replaceChildren(wrap);
            btnNova.style.display = 'none';
          },
        }, '+ Nova entrega');
        card.appendChild(btnNova);
        card.appendChild(formHolder);

        blocos.push(card);
      }
    }

    blocos.push(el('div', { class: 'bg-white rounded-xl shadow p-5 mb-6' },
      el('div', { class: 'font-semibold text-gray-700 mb-3' }, 'Histórico de entregas'),
      entregas.length === 0
        ? el('p', { class: 'text-sm text-gray-400' }, 'Nenhuma entrega registrada ainda.')
        : el('div', {}, entregas.map(ent => linhaHistorico(ent, modelosById, ops))),
    ));

    container.replaceChildren(...blocos);
  }

  function linhaHistorico(entrega, modelosById, opsCarregadas) {
    const itens = entrega.entrega_itens || [];
    const opId = itens[0]?.op_id;
    const opRef = opsCarregadas.find(o => o.id === opId);
    const opLabel = opRef ? `Lote Nº ${opRef.numero}/${opRef.ano}` : (opId ? '#' + opId : '?');

    const wrap = el('div', { class: 'border-b py-3' });
    wrap.appendChild(el('div', { class: 'flex items-center justify-between' },
      el('div', {},
        el('span', { class: 'text-sm font-medium text-gray-800' }, opLabel + ' · '),
        el('span', { class: 'text-sm text-gray-500' }, new Date(entrega.data + 'T00:00:00').toLocaleDateString('pt-BR')),
        el('span', { class: 'text-sm text-gray-500' }, ' · látex: ' + (entrega.destino?.nome || '?')),
      ),
      el('div', {},
        el('button', { class: 'text-sm text-blue-700 hover:underline mr-3',
          onclick: () => abrirEdicao(entrega, opRef, modelosById) }, 'Editar'),
        el('button', { class: 'text-sm text-red-600 hover:underline',
          onclick: () => {
            if (!opRef) { toast('OP da entrega não está mais em produção', 'error'); return; }
            excluirEntrega(entrega.id, reload);
          } }, 'Excluir'),
      ),
    ));
    if (entrega.observacao) wrap.appendChild(el('div', { class: 'text-xs text-gray-500 mb-1' }, entrega.observacao));
    for (const ei of itens) {
      const opItem = opRef?.op_itens?.find(i => i.id === ei.op_item_id);
      const modelo = opItem ? modelosById[opItem.modelo_id] : null;
      const nome = modelo
        ? `${modelo.nome} ${larguraKey(modelo.largura)}m · ${modelo.cor_1?.nome || '?'}/${modelo.cor_2?.nome || '?'}`
        : '?';
      wrap.appendChild(el('div', { class: 'text-sm text-gray-700' },
        nome + ': ' + Number(ei.metros_entregues).toFixed(2).replace('.', ',') + ' m',
        ei.defeito ? el('span', { class: 'ml-2 text-red-600 font-semibold' }, '⚠ DEFEITO') : '',
        ei.observacao ? el('span', { class: 'ml-2 text-xs text-gray-500' }, '(' + ei.observacao + ')') : '',
      ));
    }
    return wrap;
  }

  function abrirEdicao(entrega, opRef, modelosById) {
    if (!opRef) { toast('OP da entrega não está mais em produção', 'error'); return; }
    const form = buildEntregaInlineForm({ opItens: opRef.op_itens || [], modelosById, entrega, latexOptions });
    modal({
      title: `Editar entrega — Lote Nº ${opRef.numero}/${opRef.ano}`,
      body: form.node,
      saveLabel: 'Salvar alterações',
      onSave: async () => {
        const ok = await atualizarEntregaCima({ entregaId: entrega.id, opId: opRef.id, payload: form.getPayload() });
        if (ok) reload();
        return ok;
      },
    });
  }

  await reload();
  return shellLayout([{ href: '#/fornecedor/entregas', label: 'Minhas entregas' }], container);
}

async function screenFornecedorLatex() {
  const container = el('div', {});

  async function reload() {
    if (!CURRENT_USER.fornecedor_id) {
      container.replaceChildren(
        pageHeader('Meus recebimentos de látex'),
        el('div', { class: 'bg-white rounded-xl shadow p-8 text-center text-gray-500' },
          'Seu usuário não está vinculado a um fornecedor. Fale com o administrador.')
      );
      return;
    }

    const opfRes = await supa.from('op_fornecedores')
      .select('op_id, ops!inner(id, numero, ano, status, tipo, observacao, origem_op_id, op_itens(id, modelo_id, metros_pedidos))')
      .eq('fornecedor_id', CURRENT_USER.fornecedor_id)
      .eq('etapa', 'latex');
    if (opfRes.error) { toast('Erro ao carregar OPs de látex', 'error'); console.error(opfRes.error); return; }
    const ops = (opfRes.data || [])
      .map(r => r.ops)
      .filter(o => o && o.tipo === 'latex' && o.status === 'em_producao');

    const entRes = await supa.from('entregas')
      .select('id, data, observacao, criado_em, entrega_itens(id, op_id, op_item_id, metros_entregues, defeito, observacao)')
      .eq('fornecedor_id', CURRENT_USER.fornecedor_id)
      .eq('etapa', 'latex')
      .order('data', { ascending: false })
      .order('id', { ascending: false });
    if (entRes.error) { toast('Erro ao carregar recebimentos', 'error'); console.error(entRes.error); return; }
    const entregas = entRes.data || [];

    const modeloIds = [...new Set(ops.flatMap(o => (o.op_itens || []).map(i => i.modelo_id)))];
    const modelosRes = modeloIds.length
      ? await supa.from('modelos').select('id, nome, largura, cor_1:cor_1_id(id,nome), cor_2:cor_2_id(id,nome)').in('id', modeloIds)
      : { data: [] };
    const modelosById = {};
    for (const m of (modelosRes.data || [])) modelosById[m.id] = m;

    render(ops, entregas, modelosById);
  }

  function render(ops, entregas, modelosById) {
    const fmtMetros = (n) => Number(n).toFixed(2).replace('.', ',') + ' m';
    const blocos = [pageHeader('Meus recebimentos de látex')];

    if (ops.length === 0) {
      blocos.push(el('div', { class: 'bg-white rounded-xl shadow p-8 text-center text-gray-500 mb-6' },
        'Nenhuma OP de látex em produção atribuída a você no momento.'));
    } else {
      for (const op of ops) {
        const recebidosNaOP = entregas.flatMap(e => e.entrega_itens || []).filter(ei => ei.op_id === op.id);
        const totalPorItem = totalEntregueCimaPorItem(recebidosNaOP);

        const card = el('div', { class: 'bg-white rounded-xl shadow p-5 mb-6' });
        card.appendChild(el('div', { class: 'flex items-center justify-between mb-3' },
          el('div', { class: 'font-semibold text-gray-800' }, `OP de látex Nº ${op.numero}/${op.ano}`),
          badgeStatus(op.status),
        ));
        if (op.observacao) card.appendChild(el('div', { class: 'text-xs text-gray-500 mb-2' }, op.observacao));

        card.appendChild(dataTable({
          columns: [
            { key: 'modelo', label: 'Modelo', render: (i) => {
                const m = modelosById[i.modelo_id];
                return m ? `${m.nome} ${larguraKey(m.largura)}m · ${m.cor_1?.nome || '?'}/${m.cor_2?.nome || '?'}` : ('#' + i.modelo_id);
              } },
            { key: 'enviado', label: 'Enviado', render: (i) => fmtMetros(i.metros_pedidos) },
            { key: 'recebido', label: 'Recebido', render: (i) => fmtMetros(totalPorItem[i.id] || 0) },
            { key: 'falta', label: 'Falta', render: (i) => {
                const falta = Math.round((Number(i.metros_pedidos) - (totalPorItem[i.id] || 0)) * 100) / 100;
                const cor = falta <= 0 ? 'text-green-700' : 'text-gray-800';
                return el('span', { class: cor }, falta <= 0 ? '✅ completo' : fmtMetros(falta));
              } },
          ],
          rows: op.op_itens || [],
        }));

        const formHolder = el('div', {});
        const btnNova = el('button', {
          class: 'mt-3 text-sm text-blue-700 hover:underline',
          onclick: () => {
            const form = buildEntregaInlineForm({ opItens: op.op_itens || [], modelosById, comDestino: false });
            const btnSalvar = el('button', {
              class: 'bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-lg px-3 py-2 mr-2',
              onclick: async () => {
                btnSalvar.disabled = true;
                const ok = await salvarEntregaLatex({ fornecedorId: CURRENT_USER.fornecedor_id, opId: op.id, payload: form.getPayload() });
                btnSalvar.disabled = false;
                if (ok) reload();
              },
            }, 'Salvar recebimento');
            const btnCancelar = el('button', {
              class: 'bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm font-semibold rounded-lg px-3 py-2',
              onclick: () => { formHolder.replaceChildren(); btnNova.style.display = ''; },
            }, 'Cancelar');
            formHolder.replaceChildren(el('div', {}, form.node, el('div', { class: 'mt-2' }, btnSalvar, btnCancelar)));
            btnNova.style.display = 'none';
          },
        }, '+ Novo recebimento');
        card.appendChild(btnNova);
        card.appendChild(formHolder);
        blocos.push(card);
      }
    }

    const opsById = {};
    for (const o of ops) opsById[o.id] = o;
    blocos.push(el('div', { class: 'font-semibold text-gray-700 mb-2 mt-2' }, 'Histórico de recebimentos'));
    const histWrap = el('div', { class: 'bg-white rounded-xl shadow p-5' });
    if (entregas.length === 0) {
      histWrap.appendChild(el('p', { class: 'text-sm text-gray-400' }, 'Nenhum recebimento registrado ainda.'));
    } else {
      for (const entrega of entregas) {
        const itens = entrega.entrega_itens || [];
        const opId = itens[0]?.op_id;
        const opRef = opsById[opId];
        const opLabel = opRef ? `OP de látex Nº ${opRef.numero}/${opRef.ano}` : (opId ? '#' + opId : '?');
        const wrap = el('div', { class: 'border-b py-3' });
        wrap.appendChild(el('div', { class: 'flex items-center justify-between' },
          el('div', {},
            el('span', { class: 'text-sm font-medium text-gray-800' }, opLabel + ' · '),
            el('span', { class: 'text-sm text-gray-500' }, new Date(entrega.data + 'T00:00:00').toLocaleDateString('pt-BR')),
          ),
          el('div', {},
            el('button', { class: 'text-sm text-blue-700 hover:underline mr-3',
              onclick: () => abrirEdicao(entrega, opRef, modelosById) }, 'Editar'),
            el('button', { class: 'text-sm text-red-600 hover:underline',
              onclick: () => { if (!opRef) { toast('OP de látex não está mais em produção', 'error'); return; } excluirEntrega(entrega.id, reload); } }, 'Excluir'),
          ),
        ));
        if (entrega.observacao) wrap.appendChild(el('div', { class: 'text-xs text-gray-500 mb-1' }, entrega.observacao));
        for (const ei of itens) {
          const opItem = opRef?.op_itens?.find(i => i.id === ei.op_item_id);
          const modelo = opItem ? modelosById[opItem.modelo_id] : null;
          const nome = modelo ? `${modelo.nome} ${larguraKey(modelo.largura)}m · ${modelo.cor_1?.nome || '?'}/${modelo.cor_2?.nome || '?'}` : '?';
          wrap.appendChild(el('div', { class: 'text-sm text-gray-700' },
            nome + ': ' + Number(ei.metros_entregues).toFixed(2).replace('.', ',') + ' m',
            ei.defeito ? el('span', { class: 'ml-2 text-red-600 font-semibold' }, '⚠ DEFEITO') : '',
            ei.observacao ? el('span', { class: 'ml-2 text-xs text-gray-500' }, '(' + ei.observacao + ')') : '',
          ));
        }
        histWrap.appendChild(wrap);
      }
    }
    blocos.push(histWrap);

    function abrirEdicao(entrega, opRef, modelosById) {
      if (!opRef) { toast('OP de látex não está mais em produção', 'error'); return; }
      const form = buildEntregaInlineForm({ opItens: opRef.op_itens || [], modelosById, entrega, comDestino: false });
      modal({
        title: `Editar recebimento — OP de látex Nº ${opRef.numero}/${opRef.ano}`,
        body: form.node,
        saveLabel: 'Salvar alterações',
        onSave: async () => {
          const ok = await atualizarEntregaLatex({ entregaId: entrega.id, opId: opRef.id, payload: form.getPayload() });
          if (ok) reload();
          return ok;
        },
      });
    }

    container.replaceChildren(...blocos);
  }

  await reload();
  return shellLayout([{ href: '#/fornecedor/latex', label: 'Meus recebimentos de látex' }], container);
}

async function screenFornecedorOrdens() {
  const container = el('div', {});

  async function reload() {
    if (!CURRENT_USER.fornecedor_id) {
      container.replaceChildren(
        pageHeader('Minhas ordens'),
        el('div', { class: 'bg-white rounded-xl shadow p-8 text-center text-gray-500' },
          'Seu usuário não está vinculado a um fornecedor. Fale com o administrador.')
      );
      return;
    }
    const { data, error } = await supa.from('ordens_compra_fio')
      .select('id, tipo, cor_poliester, kg_pedido, kg_recebido, data_recebimento, status, ops(numero, ano), cores:cor_id(id, nome)')
      .order('id', { ascending: true });
    if (error) { toast('Erro ao carregar ordens', 'error'); console.error(error); return; }
    render(data || []);
  }

  function lote(ordem) { return ordem.ops ? `Nº ${ordem.ops.numero}/${ordem.ops.ano}` : '—'; }
  const fmtKg = (n) => (n == null ? '—' : Number(n).toFixed(3).replace('.', ',') + ' kg');

  function linhaPendente(ordem) {
    const kgInput = textInput({ type: 'number', step: '0.001', value: String(ordem.kg_pedido) });
    const dataInput = textInput({ type: 'date', value: new Date().toISOString().slice(0, 10) });
    const btn = el('button', {
      class: 'bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-lg px-3 py-2',
      onclick: async () => {
        const kg = Number(kgInput.value);
        if (!(kg > 0)) { toast('Informe o kg recebido', 'error'); return; }
        const dataRec = dataInput.value || new Date().toISOString().slice(0, 10);
        const status = kg < Number(ordem.kg_pedido) ? 'recebido_parcial' : 'recebido_total';
        btn.disabled = true;
        const { error } = await supa.from('ordens_compra_fio')
          .update({ kg_recebido: kg, data_recebimento: dataRec, status })
          .eq('id', ordem.id);
        if (error) { toast('Erro ao registrar recebimento', 'error'); console.error(error); btn.disabled = false; return; }
        toast('Recebimento registrado', 'success');
        reload();
      }
    }, 'Registrar');

    return el('div', { class: 'flex flex-wrap items-end gap-3 border-b py-3' },
      el('div', { class: 'flex-1 min-w-[160px]' },
        el('div', { class: 'text-xs text-gray-500' }, lote(ordem)),
        el('div', { class: 'font-medium text-gray-800' }, rotuloFio(ordem)),
        el('div', { class: 'text-xs text-gray-500' }, 'Pedido: ' + fmtKg(ordem.kg_pedido)),
      ),
      el('div', { class: 'w-32' }, formField({ label: 'Kg recebido', input: kgInput })),
      el('div', { class: 'w-40' }, formField({ label: 'Data', input: dataInput })),
      btn,
    );
  }

  function render(rows) {
    const pendentes = rows.filter(r => r.status === 'pendente');
    const recebidas = rows.filter(r => r.status !== 'pendente');

    const blocos = [pageHeader('Minhas ordens')];

    blocos.push(el('div', { class: 'bg-white rounded-xl shadow p-5 mb-6' },
      el('div', { class: 'font-semibold text-gray-700 mb-2' }, 'Pendentes'),
      pendentes.length === 0
        ? el('p', { class: 'text-sm text-gray-400' }, 'Nenhuma ordem pendente.')
        : el('div', {}, pendentes.map(linhaPendente)),
    ));

    blocos.push(el('div', { class: 'bg-white rounded-xl shadow p-5' },
      el('div', { class: 'font-semibold text-gray-700 mb-2' }, 'Recebidas'),
      recebidas.length === 0
        ? el('p', { class: 'text-sm text-gray-400' }, 'Nenhuma ordem recebida ainda.')
        : dataTable({
            columns: [
              { key: 'lote', label: 'Lote', render: lote },
              { key: 'fio', label: 'Fio', render: rotuloFio },
              { key: 'kg_pedido', label: 'Pedido', render: (r) => fmtKg(r.kg_pedido) },
              { key: 'kg_recebido', label: 'Recebido', render: (r) => fmtKg(r.kg_recebido) },
              { key: 'data', label: 'Data', render: (r) => new Date(r.data_recebimento + 'T00:00:00').toLocaleDateString('pt-BR') },
              { key: 'status', label: 'Status', render: (r) => OCF_STATUS_LABEL[r.status] || r.status },
            ],
            rows: recebidas,
          }),
    ));

    container.replaceChildren(...blocos);
  }

  await reload();
  return shellLayout([{ href: '#/fornecedor/ordens', label: 'Minhas ordens' }], container);
}

async function screenNovaOP(opId) {
  const container = el('div', {});
  // 1) Carrega dados de apoio
  const [modelosRes, paramsRes, fornsRes, clientesRes] = await Promise.all([
    supa.from('modelos').select('id, nome, largura, cor_1:cor_1_id(id,nome), cor_2:cor_2_id(id,nome)').order('nome'),
    supa.from('parametros_largura').select('*'),
    supa.from('fornecedores').select('id, nome, tipo').order('nome'),
    supa.from('clientes').select('id, nome').order('nome'),
  ]);
  if (modelosRes.error || paramsRes.error || fornsRes.error || clientesRes.error) {
    toast('Erro ao carregar dados da OP', 'error');
    console.error(modelosRes.error || paramsRes.error || fornsRes.error || clientesRes.error);
    return shellLayout(ADMIN_MENU, container);
  }
  const clientesOptions = (clientesRes.data || []).map(c => ({ value: c.id, label: c.nome }));
  const modelos = modelosRes.data || [];
  const modelosById = Object.fromEntries(modelos.map(m => [m.id, m]));
  const parametrosByLargura = Object.fromEntries((paramsRes.data || []).map(p => [larguraKey(p.largura), p]));
  const forns = fornsRes.data || [];
  const fornsPorTipo = (tipo) => forns.filter(f => f.tipo === tipo).map(f => ({ value: f.id, label: f.nome }));

  // 2) Estado da tela
  let op = null;                 // OP existente (modo edição/leitura)
  let itens = [];                // [{ modeloId, metros }]
  let fornSel = { fio_algodao: '', fio_poliester: '', cima: '' };
  let clienteSel = '';
  let opItensRaw = [];
  let ordens = [];
  let entregasCima = [];
  let latexOpPorEntrega = {};
  let cimaFornecedorId = null;
  let fioFornSel = { fio_algodao: '', fio_poliester: '' };
  let latexOptions = [];
  let numero = '', ano = new Date().getFullYear();
  let readOnly = false;
  let saving = false;

  if (opId) {
    const { data, error } = await supa.from('ops')
      .select('id, numero, ano, status, tipo, observacao, origem_op_id, lote_id, lote:lote_id(id, numero, cliente:cliente_id(id, nome)), op_itens(id, modelo_id, metros_pedidos, metros_ajustados), op_fornecedores(fornecedor_id, etapa)')
      .eq('id', opId).single();
    if (error || !data) {
      toast('OP não encontrada', 'error'); console.error(error);
      container.replaceChildren(pageHeader('OP não encontrada', [{ label: '← Voltar', onclick: () => navigate('#/ops') }]));
      return shellLayout(ADMIN_MENU, container);
    }
    op = data;
    clienteSel = op.lote?.cliente?.id || '';
    if (op.tipo === 'latex') return await renderOPLatexAdmin(op.id);
    numero = data.numero; ano = data.ano;
    itens = (data.op_itens || []).map(i => ({ modeloId: i.modelo_id, metros: i.metros_pedidos }));
    for (const f of (data.op_fornecedores || [])) fornSel[f.etapa] = f.fornecedor_id;
    fioFornSel.fio_algodao = (data.op_fornecedores || []).find(f => f.etapa === 'fio_algodao')?.fornecedor_id || '';
    fioFornSel.fio_poliester = (data.op_fornecedores || []).find(f => f.etapa === 'fio_poliester')?.fornecedor_id || '';
    readOnly = data.status !== 'simulada';
    opItensRaw = data.op_itens || [];
    if (op.status !== 'simulada') {
      const ordRes = await supa.from('ordens_compra_fio')
        .select('id, tipo, cor_id, cor_poliester, kg_pedido, kg_recebido, status, cores:cor_id(id, nome)')
        .eq('op_id', op.id);
      if (ordRes.error) { toast('Erro ao carregar ordens de fio', 'error'); console.error(ordRes.error); }
      ordens = ordRes.data || [];
      const cimaForn = (data.op_fornecedores || []).find(f => f.etapa === 'cima');
      cimaFornecedorId = cimaForn ? cimaForn.fornecedor_id : null;
      const latexResIni = await supa.from('fornecedores').select('id, nome').eq('tipo', 'latex').order('nome');
      if (latexResIni.error) { toast('Erro ao carregar empresas de látex', 'error'); console.error(latexResIni.error); }
      latexOptions = (latexResIni.data || []).map(f => ({ value: f.id, label: f.nome }));
      const entRes = await supa.from('entregas')
        .select('id, fornecedor_id, data, observacao, destino_fornecedor_id, destino:destino_fornecedor_id(nome), fornecedores:fornecedor_id(nome), entrega_itens(id, op_id, op_item_id, metros_entregues, defeito, observacao)')
        .eq('etapa', 'cima')
        .eq('fornecedor_id', cimaFornecedorId)
        .order('data', { ascending: false })
        .order('id', { ascending: false });
      if (entRes.error) { toast('Erro ao carregar entregas de tecelagem', 'error'); console.error(entRes.error); }
      entregasCima = (entRes.data || []).filter(e => (e.entrega_itens || []).some(ei => ei.op_id === op.id));
      const latexOpsRes = await supa.from('ops').select('id, origem_entrega_id').eq('tipo', 'latex').eq('origem_op_id', op.id);
      latexOpPorEntrega = {};
      for (const lo of (latexOpsRes.data || [])) if (lo.origem_entrega_id) latexOpPorEntrega[lo.origem_entrega_id] = lo.id;
    }
  } else {
    const { data } = await supa.from('ops').select('numero').eq('ano', ano).order('numero', { ascending: false }).limit(1);
    numero = (data && data[0] ? data[0].numero : 0) + 1;
  }

  // 3) Validação e persistência
  function itensValidos() {
    return itens.filter(i => i.modeloId && Number(i.metros) > 0);
  }

  // Persiste ops + filhos. status: 'simulada' | 'aberta'. Retorna id da OP ou null.
  async function persistir(status) {
    const numeroInt = parseInt(numero, 10), anoInt = parseInt(ano, 10);
    if (!numeroInt || !anoInt) { toast('Número e ano são obrigatórios', 'error'); return null; }
    if (!clienteSel) { toast('Escolha o cliente', 'error'); return null; }
    const validos = itensValidos();
    if (validos.length === 0) { toast('Adicione ao menos 1 item com metros', 'error'); return null; }

    if (status === 'aberta' && !fornSel.cima) {
      toast('Escolha o fornecedor de tecelagem antes de abrir a OP', 'error'); return null;
    }

    // 1) upsert ops PRIMEIRO — evita lote órfão se o número da OP duplicar.
    let opRow;
    if (op) {
      const r = await supa.from('ops').update({ numero: numeroInt, ano: anoInt, status }).eq('id', op.id).select().single();
      if (r.error) { erroSalvar(r.error); return null; }
      opRow = r.data;
    } else {
      const r = await supa.from('ops').insert({ numero: numeroInt, ano: anoInt, status }).select().single();
      if (r.error) { erroSalvar(r.error); return null; }
      opRow = r.data;
    }
    const opIdSalvo = opRow.id;

    // 2) lote: cria no 1º salvamento (OP nova ou legada sem lote); senão atualiza o
    //    cliente. Liga em ops.lote_id. Numeração depende do UNIQUE(numero) de lotes.
    let loteId = op?.lote_id || null;
    if (loteId) {
      const lu = await supa.from('lotes').update({ cliente_id: clienteSel }).eq('id', loteId);
      if (lu.error) { toast('Erro ao atualizar lote', 'error'); console.error(lu.error); return null; }
    } else {
      const proxRes = await supa.from('lotes').select('numero').order('numero', { ascending: false }).limit(1);
      if (proxRes.error) { toast('Erro ao ler lotes', 'error'); console.error(proxRes.error); return null; }
      const prox = (proxRes.data && proxRes.data[0]) ? Number(proxRes.data[0].numero) + 1 : 1;
      const li = await supa.from('lotes').insert({ numero: prox, cliente_id: clienteSel }).select().single();
      if (li.error) {
        if (!op) await supa.from('ops').delete().eq('id', opIdSalvo);  // limpa OP recém-criada
        toast('Erro ao criar lote', 'error'); console.error(li.error); return null;
      }
      loteId = li.data.id;
      const ou = await supa.from('ops').update({ lote_id: loteId }).eq('id', opIdSalvo);
      if (ou.error) { toast('Erro ao vincular lote à OP', 'error'); console.error(ou.error); return null; }
    }

    // 2) substitui op_itens
    await supa.from('op_itens').delete().eq('op_id', opIdSalvo);
    const itensPayload = validos.map(i => ({ op_id: opIdSalvo, modelo_id: i.modeloId, metros_pedidos: Number(i.metros) }));
    const itensRes = await supa.from('op_itens').insert(itensPayload);
    if (itensRes.error) {
      if (status === 'aberta') await supa.from('ops').update({ status: 'simulada' }).eq('id', opIdSalvo);
      toast('Erro ao salvar itens', 'error'); console.error(itensRes.error); return null;
    }

    // 3) substitui op_fornecedores — só tecelagem na criação (fios são atribuídos depois)
    await supa.from('op_fornecedores').delete().eq('op_id', opIdSalvo);
    if (fornSel.cima) {
      const fornRes = await supa.from('op_fornecedores').insert([{ op_id: opIdSalvo, fornecedor_id: fornSel.cima, etapa: 'cima' }]);
      if (fornRes.error) {
        if (status === 'aberta') await supa.from('ops').update({ status: 'simulada' }).eq('id', opIdSalvo);
        toast('Erro ao salvar fornecedor de tecelagem', 'error'); console.error(fornRes.error); return null;
      }
    }

    // 4) se abrir: gera ordens_compra_fio SEM fornecedor (atribuído depois)
    if (status === 'aberta') {
      const calc = calcularFiosOP(validos, modelosById, parametrosByLargura);
      const ordens = montarOrdensCompraFio(calc).map(o => ({
        op_id: opIdSalvo,
        fornecedor_id: null,
        tipo: o.tipo, cor_id: o.cor_id, cor_poliester: o.cor_poliester,
        kg_pedido: o.kg_pedido, status: 'pendente',
      }));
      await supa.from('ordens_compra_fio').delete().eq('op_id', opIdSalvo);
      const ordRes = await supa.from('ordens_compra_fio').insert(ordens);
      if (ordRes.error) {
        await supa.from('ops').update({ status: 'simulada' }).eq('id', opIdSalvo);
        toast('Falha ao gerar ordens de compra — OP mantida como simulada', 'error');
        console.error(ordRes.error);
        return null;
      }
    }

    return opIdSalvo;
  }

  function erroSalvar(error) {
    if (error.code === '23505' || (error.message && error.message.includes('duplicate'))) toast(`Já existe OP nº ${numero} em ${ano}`, 'error');
    else toast('Erro ao salvar OP', 'error');
    console.error(error);
  }

  async function salvarSimulacao() {
    if (saving) return;
    saving = true;
    try {
      const id = await persistir('simulada');
      if (id) { toast('Simulação salva', 'success'); navigate('#/ops'); }
    } finally { saving = false; }
  }
  async function abrirOP() {
    if (saving) return;
    saving = true;
    try {
      const id = await persistir('aberta');
      if (id) { toast('OP aberta — ordens de compra geradas', 'success'); navigate('#/ops'); }
    } finally { saving = false; }
  }

  // 4) Render
  function render() {
    container.replaceChildren(buildScreen());
  }

  function buildScreen() {
    const loteTxt = op && op.lote ? ` · Lote Nº ${op.lote.numero} · ${op.lote.cliente?.nome || '—'}` : '';
    const titulo = op ? `OP Nº ${op.numero}/${op.ano}${loteTxt}` + (readOnly ? ' (leitura)' : ' (editar)') : 'Nova OP';
    const wrap = el('div', {});
    wrap.appendChild(pageHeader(titulo, [{ label: '← Voltar', onclick: () => navigate('#/ops') }]));

    const grid = el('div', { class: 'flex flex-col lg:flex-row gap-6' });
    grid.appendChild(buildLeft());
    grid.appendChild(buildRight());
    wrap.appendChild(grid);
    if (op && op.status !== 'simulada') wrap.appendChild(buildBlocoFios());
    if (op && op.status !== 'simulada' && cimaFornecedorId) wrap.appendChild(buildBlocoTecelagem());
    return wrap;
  }

  function disabledAttr(node) { if (readOnly) node.setAttribute('disabled', 'disabled'); return node; }

  function buildLeft() {
    const left = el('div', { class: 'flex-1 bg-white rounded-xl shadow p-5' });

    const numInput = disabledAttr(textInput({ type: 'number', value: String(numero) }));
    const anoInput = disabledAttr(textInput({ type: 'number', value: String(ano) }));
    numInput.addEventListener('input', () => { numero = numInput.value; });
    anoInput.addEventListener('input', () => { ano = anoInput.value; });
    const lote = el('div', { class: 'flex gap-3' },
      el('div', { class: 'w-28' }, formField({ label: 'Número', input: numInput })),
      el('div', { class: 'w-28' }, formField({ label: 'Ano', input: anoInput })),
    );
    left.appendChild(lote);

    left.appendChild(el('div', { class: 'font-semibold text-gray-700 mt-2 mb-2' }, 'Itens (modelo × metros)'));
    const itensWrap = el('div', {});
    const modeloOptions = modelos.map(m => ({
      value: m.id,
      label: `${m.nome} ${larguraKey(m.largura)}m · ${m.cor_1?.nome}/${m.cor_2?.nome}`,
    }));
    itens.forEach((item, idx) => itensWrap.appendChild(buildItemRow(item, idx, modeloOptions)));
    left.appendChild(itensWrap);

    if (!readOnly) {
      left.appendChild(el('button', {
        class: 'mt-2 text-sm text-blue-700 hover:underline',
        onclick: () => { itens.push({ modeloId: '', metros: '' }); render(); }
      }, '+ adicionar item'));
    }

    left.appendChild(el('div', { class: 'font-semibold text-gray-700 mt-5 mb-2' }, 'Cliente'));
    const clienteSelEl = disabledAttr(selectInput({ options: clientesOptions, value: clienteSel, placeholder: 'Selecione o cliente...' }));

    left.appendChild(buildFornField('Tecelagem (parte de cima)', 'cima'));

    return left;
  }

  function buildItemRow(item, idx, modeloOptions) {
    const modeloSel = disabledAttr(selectInput({ options: modeloOptions, value: item.modeloId, placeholder: 'Modelo...' }));
    const metrosInput = disabledAttr(textInput({ type: 'number', value: item.metros === '' ? '' : String(item.metros), placeholder: 'metros' }));

    );

  function buildFornField(label, etapa) {
    const fornsTipo = etapa === 'cima' ? fornsPorTipo('tecelagem') : fornsPorTipo(etapa);
    const sel = disabledAttr(selectInput({ options: fornsTipo, value: fornSel[etapa], placeholder: 'Selecione...' }));

  function fmtKg(n) { return (n == null ? '—' : Number(n).toFixed(3).replace('.', ',') + ' kg'); }
  function fmtMetros(n) { return Number(n).toFixed(2).replace('.', ',') + ' m'; }
  function rotuloFioOrdem(o) {
    return o.tipo === 'algodao' ? 'Algodão — ' + (o.cores?.nome || '?') : 'Poliéster — ' + (o.cor_poliester || '?');
  }
  function rotuloModelo(modelo) {
    if (!modelo) return '?';
    return `${modelo.nome} ${larguraKey(modelo.largura)}m · ${modelo.cor_1?.nome || '?'}/${modelo.cor_2?.nome || '?'}`;

  async function atribuirFornecedorFio(etapa, tipo, fornecedorId) {
    // etapa: 'fio_algodao'|'fio_poliester'; tipo: 'algodao'|'poliester'
    if (!fornecedorId) { toast('Escolha um fornecedor', 'error'); return; }
    const u = await supa.from('ordens_compra_fio')
      .update({ fornecedor_id: fornecedorId })
      .eq('op_id', op.id).eq('tipo', tipo);
    if (u.error) { toast('Erro ao atribuir fornecedor às ordens', 'error'); console.error(u.error); return; }
    const del = await supa.from('op_fornecedores').delete().eq('op_id', op.id).eq('etapa', etapa);
    if (del.error) { toast('Erro ao remover vínculo anterior do fornecedor', 'error'); console.error(del.error); return; }
    const ins = await supa.from('op_fornecedores').insert([{ op_id: op.id, fornecedor_id: fornecedorId, etapa }]);
    if (ins.error) { toast('Erro ao vincular fornecedor', 'error'); console.error(ins.error); return; }
    fioFornSel[etapa] = fornecedorId;
    toast('Fornecedor atribuído', 'success');
    await reloadOrdens();
  }

  async function reloadOrdens() {
    if (!op || op.status === 'simulada') return;
    const r = await supa.from('ordens_compra_fio')
      .select('id, tipo, cor_id, cor_poliester, kg_pedido, kg_recebido, status, cores:cor_id(id, nome)')
      .eq('op_id', op.id);
    if (r.error) { toast('Erro ao recarregar ordens de fio', 'error'); console.error(r.error); return; }
    ordens = r.data || [];
    render();
  }

  function buildOrdemPendenteRow(ordem) {
    const kgInput = textInput({ type: 'number', step: '0.001', value: String(ordem.kg_pedido) });
    const dataInput = textInput({ type: 'date', value: new Date().toISOString().slice(0, 10) });
    const btn = el('button', {
      class: 'bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-lg px-3 py-2',
      onclick: async () => {
        const kg = Number(kgInput.value);
        if (!(kg > 0)) { toast('Informe o kg recebido', 'error'); return; }
        const dataRec = dataInput.value || new Date().toISOString().slice(0, 10);
        const status = kg < Number(ordem.kg_pedido) ? 'recebido_parcial' : 'recebido_total';
        btn.disabled = true;
        const { error } = await supa.from('ordens_compra_fio')
          .update({ kg_recebido: kg, data_recebimento: dataRec, status })
          .eq('id', ordem.id);
        if (error) { toast('Erro ao registrar recebimento', 'error'); console.error(error); btn.disabled = false; return; }
        toast('Recebimento registrado', 'success');
        reloadOrdens();
      }
    }, 'Registrar');

    return el('div', { class: 'flex flex-wrap items-end gap-3 border-b py-3' },
      el('div', { class: 'flex-1 min-w-[200px]' },
        el('div', { class: 'font-medium text-gray-800' }, rotuloFioOrdem(ordem)),
        el('div', { class: 'text-xs text-gray-500' }, 'Pedido: ' + fmtKg(ordem.kg_pedido)),
      ),
      el('div', { class: 'w-32' }, formField({ label: 'Kg recebido', input: kgInput })),
      el('div', { class: 'w-40' }, formField({ label: 'Data', input: dataInput })),
      btn,
    );
  }

  function gerarPdfCompraFios() {
    const jsPDFCtor = window.jspdf && window.jspdf.jsPDF;
    if (!jsPDFCtor) { toast('Biblioteca de PDF não carregou', 'error'); return; }
    const g = agruparOrdensCompraFio(ordens);
    const doc = new jsPDFCtor();
    const loteTxt = op.lote ? `Lote Nº ${op.lote.numero} · ${op.lote.cliente?.nome || '—'}` : 'Lote —';
    let y = 15;
    doc.setFontSize(14); doc.text('Compra de fios', 14, y); y += 8;
    doc.setFontSize(10);
    doc.text(`${loteTxt}`, 14, y); y += 6;
    doc.text(`OP Nº ${op.numero}/${op.ano} · ${new Date().toLocaleDateString('pt-BR')}`, 14, y); y += 10;

    const secao = (titulo, lista, total) => {
      doc.setFontSize(12); doc.text(titulo, 14, y); y += 6;
      doc.setFontSize(10);
      if (lista.length === 0) { doc.text('—', 18, y); y += 6; }
      for (const it of lista) {
        doc.text(`${it.rotulo}`, 18, y);
        doc.text(`${it.kg.toFixed(3).replace('.', ',')} kg`, 120, y);
        y += 6;
      }
      doc.setFont(undefined, 'bold');
      doc.text(`Total ${titulo}: ${total.toFixed(3).replace('.', ',')} kg`, 18, y);
      doc.setFont(undefined, 'normal');
      y += 10;
    };
    secao('Algodão', g.algodao, g.totalAlgodao);
    secao('Poliéster', g.poliester, g.totalPoliester);

    doc.save(`compra-fios-OP-${op.numero}-${op.ano}.pdf`);
  }

  async function reloadEntregasCima() {
    const entRes = await supa.from('entregas')
      .select('id, fornecedor_id, data, observacao, destino_fornecedor_id, destino:destino_fornecedor_id(nome), fornecedores:fornecedor_id(nome), entrega_itens(id, op_id, op_item_id, metros_entregues, defeito, observacao)')
      .eq('etapa', 'cima')

    entregasCima = (entRes.data || []).filter(e => (e.entrega_itens || []).some(ei => ei.op_id === op.id));

    latexOpPorEntrega = {};

    render();

  // Limite individual de metros de um item assumindo os demais em zero
  // (cada cor consumida pelo item × kg_recebido daquela cor). Usado pra capar o slider.
  function maxMetrosItem(item) {
    const modelo = modelosById[item.modelo_id];
    const p = parametrosByLargura[larguraKey(modelo.largura)];
    const rAlg = p.algodao_por_ml * p.valor_x;
    const rPol = p.poliester_por_ml * p.valor_x;
    let cap = Infinity;
    for (const cor of [modelo.cor_1, modelo.cor_2]) {
      const ord = ordens.find(o => o.tipo === 'algodao' && o.cor_id === cor.id);
      if (ord && rAlg > 0) cap = Math.min(cap, Number(ord.kg_recebido) / rAlg);
    }
    for (const corP of ['PRETO', 'BRANCO']) {
      const ord = ordens.find(o => o.tipo === 'poliester' && o.cor_poliester === corP);
      if (ord && rPol > 0) cap = Math.min(cap, Number(ord.kg_recebido) / rPol);
    }
    return Number.isFinite(cap) ? Math.floor(cap) : 0;
  }

  function buildProposta() {
    const itensCalc = opItensRaw.map(i => ({ op_item_id: i.id, modelo_id: i.modelo_id, metros_pedidos: Number(i.metros_pedidos) }));
    const resultado = recalcularOP(itensCalc, ordens);

    // Estado editável: metros escolhidos pelo admin por op_item_id.
    // Default = proposta proporcional do fator-gargalo.
    const metrosOverride = {};
    for (const it of resultado.itens) metrosOverride[it.op_item_id] = it.metros_ajustados;

    const wrap = el('div', { class: 'mt-4' });

    const semFio = ordens.some(o => Number(o.kg_recebido) <= 0);
    if (semFio) wrap.appendChild(el('p', { class: 'text-sm text-red-600 mb-2' }, 'Atenção: alguma ordem foi recebida com 0 kg.'));

    wrap.appendChild(el('p', { class: 'text-sm text-gray-700 mb-2' },
      'Fator proporcional (cor mais escassa): ', el('b', {}, resultado.fator.toFixed(2).replace('.', ','))));
    wrap.appendChild(el('p', { class: 'text-xs text-gray-500 mb-3' },
      'Arraste os sliders abaixo para redistribuir os metros entre os modelos. O consumo de fio é recalculado ao vivo; o botão "Aceitar" trava se alguma cor exceder o recebido.'));

    // Sliders por item ----------------------------------------------------
    const sliders = el('div', { class: 'space-y-3 mb-4' });
    const itemRowState = {};  // { [op_item_id]: { slider, valorLabel } }

    for (const c of itensCalc) {
      const max = Math.max(maxMetrosItem(c), c.metros_pedidos);
      const slider = el('input', {
        type: 'range', min: '0', max: String(max), step: '1',
        class: 'w-full',
      });
      slider.value = String(Math.round(metrosOverride[c.op_item_id]));
      const valorLabel = el('span', { class: 'text-sm font-semibold text-gray-800 w-20 text-right' }, fmtMetros(Number(slider.value)));
      slider.addEventListener('input', () => {
        metrosOverride[c.op_item_id] = Number(slider.value);
        valorLabel.textContent = fmtMetros(Number(slider.value));
        recompute();
      });

      const modelo = modelosById[c.modelo_id];
      const linha = el('div', { class: 'border rounded-lg p-3' },
        el('div', { class: 'flex items-center justify-between mb-1' },
          el('div', { class: 'text-sm font-medium text-gray-800' }, rotuloModelo(modelo) + '  ·  pedido ' + fmtMetros(c.metros_pedidos)),
          valorLabel,
        ),
        slider,
        el('div', { class: 'flex justify-between text-xs text-gray-400 mt-1' },
          el('span', {}, '0 m'),
          el('span', {}, 'máx individual: ' + fmtMetros(max)),
        ),
      );
      sliders.appendChild(linha);
      itemRowState[c.op_item_id] = { slider, valorLabel };
    }
    wrap.appendChild(sliders);

    // Painel de consumo de fio (recomputa a cada movimento) ---------------
    const consumoBox = el('div', { class: 'bg-gray-50 rounded-lg p-3 mb-3' });
    wrap.appendChild(consumoBox);

    const btnReset = el('button', {
      class: 'text-sm text-blue-700 hover:underline mb-3',
      onclick: () => {
        for (const it of resultado.itens) {
          const v = Math.round(it.metros_ajustados);
          metrosOverride[it.op_item_id] = v;
          const row = itemRowState[it.op_item_id];
          if (row) { row.slider.value = String(v); row.valorLabel.textContent = fmtMetros(v); }
        }
        recompute();
      },
    }, '↺ Voltar à proposta proporcional');
    wrap.appendChild(btnReset);

    const btnAceitar = el('button', {
      class: 'font-semibold rounded-lg px-4 py-2 mt-4 mr-2',
      onclick: () => onAceitar(),
    }, 'Aceitar proposta');
    const btnManter = el('button', {
      class: 'bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold rounded-lg px-4 py-2 mt-4',
      onclick: () => aplicarRecalculo(resultado, 'manter'),
    }, 'Manter pedido');
    wrap.appendChild(el('div', {}, btnAceitar, btnManter));

    function itensComMetrosAtuais() {
      return itensCalc.map(c => ({ op_item_id: c.op_item_id, modelo_id: c.modelo_id, metros: metrosOverride[c.op_item_id] || 0 }));
    }

    function recompute() {
      const consumos = consumoPorOrdem(itensComMetrosAtuais(), ordens, modelosById, parametrosByLargura);
      const algumExcede = consumos.some(c => c.sobra < 0);

      const linhas = [el('div', { class: 'text-xs uppercase text-gray-500 mb-2' }, 'Consumo de fio')];
      for (const c of consumos) {
        const o = ordens.find(x => x.id === c.ordem_id);
        const nome = o.tipo === 'algodao'
          ? 'Algodão — ' + (o.cores?.nome || '?')
          : 'Poliéster — ' + o.cor_poliester;
        const sobraTxt = c.sobra >= 0
          ? `sobra ${fmtKg(c.sobra)}`
          : `EXCEDE em ${fmtKg(-c.sobra)}`;
        linhas.push(el('div', { class: 'flex justify-between text-sm py-1 ' + (c.sobra < 0 ? 'text-red-600' : 'text-gray-700') },
          el('span', {}, nome + ': ' + fmtKg(c.kg_consumido) + ' / ' + fmtKg(c.kg_recebido)),
          el('span', { class: 'font-medium' }, sobraTxt),
        ));
      }
      consumoBox.replaceChildren(...linhas);

      if (algumExcede) {
        btnAceitar.disabled = true;
        btnAceitar.className = 'font-semibold rounded-lg px-4 py-2 mt-4 mr-2 bg-blue-300 text-white cursor-not-allowed';
      } else {
        btnAceitar.disabled = false;
        btnAceitar.className = 'font-semibold rounded-lg px-4 py-2 mt-4 mr-2 bg-blue-700 hover:bg-blue-800 text-white';
      }
    }

    function onAceitar() {
      const round3 = (n) => Math.round(n * 1000) / 1000;
      const consumos = consumoPorOrdem(itensComMetrosAtuais(), ordens, modelosById, parametrosByLargura);
      if (consumos.some(c => c.sobra < 0)) { toast('Algum fio está excedido — ajuste os sliders', 'error'); return; }
      const itensFinais = itensCalc.map(c => ({
        op_item_id: c.op_item_id,
        metros_pedidos: c.metros_pedidos,
        metros_ajustados: Math.round((metrosOverride[c.op_item_id] || 0) * 100) / 100,
      }));
      const sobrasFinais = consumos
        .filter(c => c.sobra > 0)
        .map(c => {
          const o = ordens.find(x => x.id === c.ordem_id);
          return {
            ordem_id: o.id, tipo: o.tipo,
            cor_id: o.cor_id ?? null, cor_poliester: o.cor_poliester ?? null,
            kg_sobra: round3(c.sobra),
          };
        });
      aplicarRecalculo({ fator: resultado.fator, itens: itensFinais, sobras: sobrasFinais }, 'aceitar');
    }

    recompute();
    return wrap;
  }

  async function aplicarRecalculo(resultado, modo) {
    if (saving) return;
    saving = true;
    try {
      // 1) grava metros_ajustados em cada op_item
      for (const it of resultado.itens) {
        const metros = modo === 'aceitar' ? it.metros_ajustados : it.metros_pedidos;
        const r = await supa.from('op_itens').update({ metros_ajustados: metros }).eq('id', it.op_item_id);
        if (r.error) { toast('Erro ao gravar metros ajustados', 'error'); console.error(r.error); return; }
      }

      // 2) calcula as sobras conforme o modo
      const round3 = (n) => Math.round(n * 1000) / 1000;
      const sobras = modo === 'aceitar'
        ? resultado.sobras
        : ordens.map(o => {
            const kg = round3(Number(o.kg_recebido) - Number(o.kg_pedido));
            return kg > 0
              ? { ordem_id: o.id, tipo: o.tipo, cor_id: o.cor_id ?? null, cor_poliester: o.cor_poliester ?? null, kg_sobra: kg }
              : null;
          }).filter(Boolean);

      // 3) grava saldo por OP + atualiza o totalizador
      for (const s of sobras) {
        const insOp = await supa.from('saldo_fios_op').insert({
          op_id: op.id, cor_id: s.cor_id, cor_poliester: s.cor_poliester, tipo: s.tipo, kg_sobra: s.kg_sobra,
        });
        if (insOp.error) { toast('Erro ao gravar saldo da OP — verifique no Supabase', 'error'); console.error(insOp.error); navigate('#/ops'); return; }

        // totalizador saldo_fios: lê (filtrando por cor/tipo), soma e grava
        let sel = supa.from('saldo_fios').select('kg_total').eq('tipo', s.tipo);
        sel = s.cor_id != null ? sel.eq('cor_id', s.cor_id) : sel.is('cor_id', null).eq('cor_poliester', s.cor_poliester);
        const cur = await sel.maybeSingle();
        if (cur.error) { toast('Erro ao ler saldo total — verifique no Supabase', 'error'); console.error(cur.error); navigate('#/ops'); return; }
        const novoTotal = round3((cur.data ? Number(cur.data.kg_total) : 0) + s.kg_sobra);

        let saveTotal;
        if (cur.data) {
          let upd = supa.from('saldo_fios').update({ kg_total: novoTotal, atualizado_em: new Date().toISOString() }).eq('tipo', s.tipo);
          upd = s.cor_id != null ? upd.eq('cor_id', s.cor_id) : upd.is('cor_id', null).eq('cor_poliester', s.cor_poliester);
          saveTotal = await upd;
        } else {
          saveTotal = await supa.from('saldo_fios').insert({
            cor_id: s.cor_id, cor_poliester: s.cor_poliester, tipo: s.tipo, kg_total: novoTotal,
          });
        }
        if (saveTotal.error) { toast('Erro ao gravar saldo total — verifique no Supabase', 'error'); console.error(saveTotal.error); navigate('#/ops'); return; }
      }

      // 4) libera a produção
      const st = await supa.from('ops').update({ status: 'em_producao' }).eq('id', op.id);
      if (st.error) { toast('Erro ao mudar status — saldo já gravado, verifique no Supabase', 'error'); console.error(st.error); navigate('#/ops'); return; }

      toast(modo === 'aceitar' ? 'Proposta aceita — produção liberada' : 'Pedido mantido — produção liberada', 'success');
      navigate('#/ops');
    } finally {
      saving = false;
    }
  }

  let rightNode = null;
  function buildRight() {
    rightNode = el('div', { class: 'lg:w-80 bg-gray-50 rounded-xl shadow p-5 self-start' });
    renderRightInto();
    return rightNode;
  }
  function renderRight() { if (rightNode) renderRightInto(); }

  function renderRightInto() {
    let calc;
    try {
      calc = calcularFiosOP(itens, modelosById, parametrosByLargura);
    } catch (err) {
      rightNode.replaceChildren(el('p', { class: 'text-red-600 text-sm' }, err.message));
      return;
    }
    const fmt = (n) => Number(n).toFixed(3).replace('.', ',') + ' kg';
    const children = [el('div', { class: 'font-semibold text-gray-700 mb-3' }, 'Fio necessário')];

    const algEntries = Object.values(calc.algodaoPorCor);
    children.push(el('div', { class: 'text-xs uppercase text-gray-500 mb-1' }, 'Algodão'));
    if (algEntries.length === 0) children.push(el('p', { class: 'text-sm text-gray-400 mb-2' }, '—'));
    for (const a of algEntries) children.push(el('p', { class: 'text-sm mb-1' }, `${a.corNome}: `, el('b', {}, fmt(a.kg))));

    children.push(el('div', { class: 'text-xs uppercase text-gray-500 mt-3 mb-1' }, 'Poliéster'));
    children.push(el('p', { class: 'text-sm mb-1' }, 'PRETO: ', el('b', {}, fmt(calc.poliester.PRETO))));
    children.push(el('p', { class: 'text-sm mb-1' }, 'BRANCO: ', el('b', {}, fmt(calc.poliester.BRANCO))));

    if (!readOnly) {
      const faltamForn = [];
      if (!clienteSel) faltamForn.push('cliente');
      if (!fornSel.cima) faltamForn.push('tecelagem');
      const btnSim = el('button', {
        class: 'w-full mt-5 mb-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold rounded-lg py-2',
        onclick: salvarSimulacao,
      }, 'Salvar simulação');
      const btnAbrir = el('button', {
        class: 'w-full font-semibold rounded-lg py-2 ' + (faltamForn.length
          ? 'bg-blue-300 text-white cursor-not-allowed'
          : 'bg-blue-700 hover:bg-blue-800 text-white'),
        onclick: () => { if (!faltamForn.length) abrirOP(); },
      }, 'Abrir OP');
      if (faltamForn.length) btnAbrir.setAttribute('disabled', 'disabled');
      children.push(btnSim, btnAbrir);
      if (faltamForn.length) children.push(el('p', { class: 'text-xs text-gray-500 mt-1' }, 'Escolha cliente e fornecedor de tecelagem para abrir.'));
    }

    rightNode.replaceChildren(...children);
    rightNode._calc = calc;
  }

  render();
  return shellLayout(ADMIN_MENU, container);
}

async function renderOPLatexAdmin(opId) {
  const container = el('div', {});
  const fmtMetros = (n) => Number(n).toFixed(2).replace('.', ',') + ' m';

  async function reload() {
    const opRes = await supa.from('ops')
      .select('id, numero, ano, status, tipo, observacao, origem_op_id, lote:lote_id(numero, cliente:cliente_id(nome)), op_itens(id, modelo_id, metros_pedidos), op_fornecedores(fornecedor_id, etapa, fornecedores:fornecedor_id(nome))')
      .eq('id', opId).single();
    if (opRes.error) { toast('Erro ao carregar OP de látex', 'error'); console.error(opRes.error); return; }
    const op = opRes.data;
    const latexForn = (op.op_fornecedores || []).find(f => f.etapa === 'latex');
    const latexFornecedorId = latexForn ? latexForn.fornecedor_id : null;

    const entRes = await supa.from('entregas')
      .select('id, fornecedor_id, data, observacao, entrega_itens(id, op_id, op_item_id, metros_entregues, defeito, observacao)')
      .eq('etapa', 'latex').eq('fornecedor_id', latexFornecedorId)
      .order('data', { ascending: false }).order('id', { ascending: false });
    const recebimentos = (entRes.data || []).filter(e => (e.entrega_itens || []).some(ei => ei.op_id === op.id));

    const modeloIds = [...new Set((op.op_itens || []).map(i => i.modelo_id))];
    const modelosRes = modeloIds.length
      ? await supa.from('modelos').select('id, nome, largura, cor_1:cor_1_id(id,nome), cor_2:cor_2_id(id,nome)').in('id', modeloIds)
      : { data: [] };
    const modelosById = {};
    for (const m of (modelosRes.data || [])) modelosById[m.id] = m;

    render(op, recebimentos, modelosById, latexFornecedorId);
  }

  function render(op, recebimentos, modelosById, latexFornecedorId) {
    const recItens = recebimentos.flatMap(e => (e.entrega_itens || []).filter(ei => ei.op_id === op.id));
    const totalPorItem = totalEntregueCimaPorItem(recItens);

    const acoes = [{ label: '← Voltar', onclick: () => navigate('#/ops') }];
    if (op.origem_op_id) acoes.push({ label: 'Ir para OP de tecelagem', onclick: () => navigate('#/ops/' + op.origem_op_id) });
    if (op.status === 'em_producao') acoes.push({ label: 'Finalizar OP de látex', onclick: () => finalizar(op.id) });
    if (op.status === 'em_producao') acoes.push({ label: 'Editar enviado', onclick: () => editarEnviado(op, modelosById) });
    acoes.push({ label: 'Excluir OP de látex', onclick: () => excluirOpLatex(op.id) });
    const header = pageHeader(`OP de látex Nº ${op.numero}/${op.ano}`, acoes);

    const info = el('div', { class: 'bg-white rounded-xl shadow p-5 mb-4' },
      el('div', { class: 'flex items-center gap-3 mb-2' }, badgeTipo('latex'), badgeStatus(op.status)),
      op.lote ? el('div', { class: 'text-sm text-gray-700 mb-1' }, `Lote Nº ${op.lote.numero} · ${op.lote.cliente?.nome || '—'}`) : el('span', {}),
      op.observacao ? el('div', { class: 'text-sm text-gray-600' }, op.observacao) : el('span', {}),
    );

    const tabela = dataTable({
      columns: [
        { key: 'modelo', label: 'Modelo', render: (i) => {
            const m = modelosById[i.modelo_id];
            return m ? `${m.nome} ${larguraKey(m.largura)}m · ${m.cor_1?.nome || '?'}/${m.cor_2?.nome || '?'}` : ('#' + i.modelo_id);
          } },
        { key: 'enviado', label: 'Enviado', render: (i) => fmtMetros(i.metros_pedidos) },
        { key: 'recebido', label: 'Recebido', render: (i) => fmtMetros(totalPorItem[i.id] || 0) },
        { key: 'falta', label: 'Falta', render: (i) => {
            const falta = Math.round((Number(i.metros_pedidos) - (totalPorItem[i.id] || 0)) * 100) / 100;
            return el('span', { class: falta <= 0 ? 'text-green-700' : 'text-gray-800' }, falta <= 0 ? '✅ completo' : fmtMetros(falta));
          } },
      ],
      rows: op.op_itens || [],
    });

    const box = el('div', { class: 'bg-white rounded-xl shadow p-5' });
    box.appendChild(el('div', { class: 'font-semibold text-gray-700 mb-3' }, 'Recebimentos'));

    if (op.status === 'em_producao' && latexFornecedorId) {
      const formHolder = el('div', {});
      const btnNova = el('button', { class: 'text-sm text-blue-700 hover:underline mb-2',
        onclick: () => {
          const form = buildEntregaInlineForm({ opItens: op.op_itens || [], modelosById, comDestino: false });
          const btnSalvar = el('button', { class: 'bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-lg px-3 py-2 mr-2',
            onclick: async () => { btnSalvar.disabled = true;
              const ok = await salvarEntregaLatex({ fornecedorId: latexFornecedorId, opId: op.id, payload: form.getPayload() });
              btnSalvar.disabled = false; if (ok) reload(); } }, 'Salvar recebimento');
          const btnCancelar = el('button', { class: 'bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm font-semibold rounded-lg px-3 py-2',
            onclick: () => { formHolder.replaceChildren(); btnNova.style.display = ''; } }, 'Cancelar');
          formHolder.replaceChildren(el('div', {}, form.node, el('div', { class: 'mt-2' }, btnSalvar, btnCancelar)));
          btnNova.style.display = 'none';
        } }, '+ Novo recebimento');
      box.appendChild(btnNova);
      box.appendChild(formHolder);
    }

    if (recebimentos.length === 0) {
      box.appendChild(el('p', { class: 'text-sm text-gray-400 mt-2' }, 'Nenhum recebimento registrado ainda.'));
    } else {
      for (const ent of recebimentos) {
        const sub = el('div', { class: 'border-b py-3' });
        sub.appendChild(el('div', { class: 'flex items-center justify-between' },
          el('div', { class: 'text-sm' }, el('b', {}, new Date(ent.data + 'T00:00:00').toLocaleDateString('pt-BR'))),
          op.status === 'em_producao' ? el('div', {},
            el('button', { class: 'text-sm text-blue-700 hover:underline mr-3',
              onclick: () => abrirEdicaoAdmin(ent, op, modelosById) }, 'Editar'),
            el('button', { class: 'text-sm text-red-600 hover:underline',
              onclick: () => excluirEntrega(ent.id, reload) }, 'Excluir'),
          ) : '',
        ));
        if (ent.observacao) sub.appendChild(el('div', { class: 'text-xs text-gray-500' }, ent.observacao));
        for (const ei of (ent.entrega_itens || []).filter(x => x.op_id === op.id)) {
          const it = (op.op_itens || []).find(i => i.id === ei.op_item_id);
          const m = it ? modelosById[it.modelo_id] : null;
          const nome = m ? `${m.nome} ${larguraKey(m.largura)}m · ${m.cor_1?.nome || '?'}/${m.cor_2?.nome || '?'}` : '?';
          sub.appendChild(el('div', { class: 'text-sm text-gray-700' },
            nome + ': ' + fmtMetros(ei.metros_entregues),
            ei.defeito ? el('span', { class: 'ml-2 text-red-600 font-semibold' }, '⚠ DEFEITO') : '',
            ei.observacao ? el('span', { class: 'ml-2 text-xs text-gray-500' }, '(' + ei.observacao + ')') : '',
          ));
        }
        box.appendChild(sub);
      }
    }

    function abrirEdicaoAdmin(ent, op, modelosById) {
      const form = buildEntregaInlineForm({ opItens: op.op_itens || [], modelosById, entrega: ent, comDestino: false });
      modal({
        title: `Editar recebimento — ${new Date(ent.data + 'T00:00:00').toLocaleDateString('pt-BR')}`,
        body: form.node, saveLabel: 'Salvar alterações',
        onSave: async () => { const ok = await atualizarEntregaLatex({ entregaId: ent.id, opId: op.id, payload: form.getPayload() }); if (ok) reload(); return ok; },
      });
    }

    container.replaceChildren(header, info, tabela, el('div', { class: 'h-4' }), box);
  }

  async function finalizar(id) {
    confirmDialog({
      title: 'Finalizar OP de látex',
      message: 'Marcar esta OP de látex como finalizada?',
      confirmLabel: 'Finalizar',
      onConfirm: async () => {
        const r = await supa.from('ops').update({ status: 'finalizada', finalizada_em: new Date().toISOString() }).eq('id', id);
        if (r.error) { toast('Erro ao finalizar', 'error'); console.error(r.error); return; }
        toast('OP de látex finalizada', 'success'); reload();
      },
    });
  }

  function editarEnviado(op, modelosById) {
    const linhas = (op.op_itens || []).map(it => {
      const m = modelosById[it.modelo_id];
      const rotulo = m ? `${m.nome} ${larguraKey(m.largura)}m · ${m.cor_1?.nome || '?'}/${m.cor_2?.nome || '?'}` : ('#' + it.modelo_id);
      const input = textInput({ type: 'number', step: '0.01', value: String(it.metros_pedidos) });
      return { id: it.id, input, node: el('div', { class: 'flex items-center gap-2 mb-2' },
        el('div', { class: 'flex-1 text-sm text-gray-700' }, rotulo),
        el('div', { class: 'w-32' }, formField({ label: 'Enviado (m)', input })),
      ) };
    });
    modal({
      title: 'Editar enviado (manual)',
      body: el('div', {}, el('p', { class: 'text-xs text-gray-500 mb-3' }, 'Ajuste os metros enviados por modelo.'), ...linhas.map(l => l.node)),
      saveLabel: 'Salvar',
      onSave: async () => {
        for (const l of linhas) {
          const val = Number(l.input.value);
          if (!Number.isFinite(val) || val <= 0) { toast('Informe um valor maior que zero em todos os modelos', 'error'); return false; }
        }
        for (const l of linhas) {
          const r = await supa.from('op_itens').update({ metros_pedidos: Number(l.input.value) }).eq('id', l.id);
          if (r.error) { toast('Erro ao salvar enviado', 'error'); console.error(r.error); return false; }
        }
        toast('Enviado atualizado', 'success'); reload(); return true;
      },
    });
  }

  function excluirOpLatex(id) {
    confirmDialog({
      title: 'Excluir OP de látex',
      message: 'Isto remove a OP de látex e seus itens. Se já houver recebimentos lançados, a exclusão será bloqueada — exclua os recebimentos primeiro. Continuar?',
      confirmLabel: 'Excluir',
      onConfirm: async () => {
        const r = await supa.from('ops').delete().eq('id', id);
        if (r.error) { toast('Erro ao excluir OP de látex', 'error'); console.error(r.error); return; }
        toast('OP de látex excluída', 'success'); navigate('#/ops');
      },
    });
  }

  await reload();
  return shellLayout(ADMIN_MENU, container);
}

  '#/fornecedor/ordens': { render: screenFornecedorOrdens, roles: ['fornecedor'] },
  '#/fornecedor/entregas': { render: screenFornecedorEntregas, roles: ['fornecedor'] },

});

async function main() {
  window.addEventListener('hashchange', handleRoute);

  await loadCurrentUser();
  if (!CURRENT_USER) {
    navigate('#/login');
  } else {
    if (location.hash && location.hash !== '#/login') handleRoute();
    else routeAfterLogin();
  }
}

main().catch(err => {
  console.error(err);
  toast('Erro ao iniciar o app', 'error');
});
